<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prince E2EE Convo — Login</title>
<style>
  :root {
    --bg: #070d07;
    --card: #0f1a0f;
    --green: #00e676;
    --green2: #00c853;
    --green-dim: rgba(0,230,118,0.12);
    --green-glow: 0 0 20px rgba(0,230,118,0.4);
    --border: #1b3320;
    --text: #e8f5e9;
    --text-dim: #66bb6a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: radial-gradient(ellipse at 50% 0%, rgba(0,230,118,0.06) 0%, transparent 70%);
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px 36px;
    width: 340px;
    box-shadow: 0 0 40px rgba(0,230,118,0.08), 0 8px 32px rgba(0,0,0,0.6);
  }
  .brand {
    text-align: center;
    margin-bottom: 28px;
  }
  .brand-icon {
    width: 68px;
    height: 68px;
    margin: 0 auto 12px;
    background: radial-gradient(circle, rgba(0,230,118,0.2) 0%, transparent 70%);
    border: 2px solid var(--green);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    box-shadow: var(--green-glow);
  }
  .brand-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 1px;
    text-shadow: 0 0 12px rgba(0,230,118,0.5);
  }
  .brand-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .field {
    margin-bottom: 14px;
  }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .field input {
    width: 100%;
    background: #0a140a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(0,230,118,0.1);
  }
  .field input::placeholder { color: #2e4a2e; }
  .btn-login {
    width: 100%;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 0.5px;
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
  }
  .btn-login:hover { background: #00ff88; box-shadow: 0 0 18px rgba(0,230,118,0.5); }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg {
    background: rgba(244,67,54,0.12);
    border: 1px solid rgba(244,67,54,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #ef9a9a;
    margin-bottom: 14px;
    display: none;
  }
  .footer-credit {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: #2e4a2e;
  }
  .footer-credit a { color: var(--green); text-decoration: none; }
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <div class="brand-icon">👁</div>
    <div class="brand-name">PRINCE E2EE CONVO</div>
    <div class="brand-sub">Secure Message Sender</div>
  </div>
  <div class="error-msg" id="errMsg"></div>
  <div class="field">
    <label>USERNAME</label>
    <input type="text" id="username" placeholder="Username daalo" autocomplete="username">
  </div>
  <div class="field">
    <label>PASSWORD</label>
    <input type="password" id="password" placeholder="Password daalo" autocomplete="current-password">
  </div>
  <button class="btn-login" id="loginBtn" onclick="doLogin()">Login</button>
  <div style="text-align:center;margin-top:18px;font-size:12px;color:#2e4a2e;">
    Account nahi hai? <a href="/register" style="color:var(--green);text-decoration:none;font-weight:600;">Register karo</a>
  </div>
  <div class="footer-credit">Developed by <a href="#">Prince Malhotra</a></div>
</div>
<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errMsg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    err.style.display = 'none';
    if (!username || !password) { showErr('Username aur password daalo'); return; }
    btn.disabled = true;
    btn.textContent = 'Logging in...';
    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/';
      } else {
        showErr(data.error || 'Login failed');
      }
    } catch (e) {
      showErr('Server se connect nahi ho saka');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
